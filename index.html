<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Booking Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .button {
            background: #5cb85c;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }
        /* Additional styles here */
    </style>
</head>
<body>
    <header>
        <h1>DJ Booking Manager</h1>
    </header>
    <div class="container">
        <h2>Book a DJ</h2>
        <form id="booking-form">
            <label for="dj-name">DJ Name:</label>
            <input type="text" id="dj-name" name="dj-name" required><br>
            <label for="event-date">Event Date:</label>
            <input type="date" id="event-date" name="event-date" required><br>
            <label for="event-time">Event Time:</label>
            <input type="time" id="event-time" name="event-time" required><br>
            <input type="submit" value="Book DJ" class="button">
        </form>
        <div id="booking-list"></div>
        <script>
            const form = document.getElementById('booking-form');
            const bookingList = document.getElementById('booking-list');

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                const djName = document.getElementById('dj-name').value;
                const eventDate = document.getElementById('event-date').value;
                const eventTime = document.getElementById('event-time').value;
                const listItem = document.createElement('div');
                listItem.textContent = `DJ: ${djName}, Date: ${eventDate}, Time: ${eventTime}`;
                bookingList.appendChild(listItem);
                form.reset();
            });
        </script>
    </div>
</body>
</html>
